apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: autodev
type: Opaque
stringData:
  POSTGRES_DB: autodev
  POSTGRES_USER: autodev
  POSTGRES_PASSWORD: autodev
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: autodev
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secrets
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: autodev
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
