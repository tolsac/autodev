apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: autodev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: autodev/backend:latest
          imagePullPolicy: Never
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - secretRef:
                name: backend-secrets
            - configMapRef:
                name: backend-config
      containers:
        - name: backend
          image: autodev/backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secrets
            - configMapRef:
                name: backend-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: autodev
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
