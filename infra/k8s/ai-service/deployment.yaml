apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: autodev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: autodev/ai-service:latest
          envFrom:
            - secretRef:
                name: ai-service-secrets
            - configMapRef:
                name: ai-service-config
