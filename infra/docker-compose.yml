services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: autodev
      POSTGRES_USER: autodev
      POSTGRES_PASSWORD: autodev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../
      dockerfile: infra/docker/backend/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../apps/backend:/app

  celery-worker:
    build:
      context: ../
      dockerfile: infra/docker/backend/Dockerfile
    command: celery -A config worker --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ../apps/backend:/app

  ai-service:
    build:
      context: ../
      dockerfile: infra/docker/ai-service/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      POSTGRES_HOST: postgres
    depends_on:
      - redis
      - postgres
    volumes:
      - ../apps/ai-service:/app

  frontend:
    build:
      context: ../
      dockerfile: infra/docker/frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
